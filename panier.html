<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Panier</title>

<link rel="stylesheet" href="VTM1.css">

</head>
<body>

<h1>🛒 Mon Panier</h1>

<div id="listePanier"></div>

<div class="total-box">
    <h2 id="totalGeneral">TOTAL : 0 FCFA</h2>
</div>

<div class="actions">

<button class="retour"
onclick="window.location.href='index.html'">
← Continuer les achats
</button>

<button class="whatsapp"
onclick="commanderTout()">
🛍 Commander tout le panier
</button>

</div>

<script>

let panier =
JSON.parse(localStorage.getItem("panier")) || [];

/* =========================
   AFFICHER PANIER
========================= */
function afficherPanier(){

    let liste =
    document.getElementById("listePanier");

    let totalGeneral = 0;

    liste.innerHTML = "";

    if(panier.length === 0){

        liste.innerHTML =
        "<div class='vide'>Votre panier est vide</div>";

        document.getElementById("totalGeneral").innerText =
        "TOTAL : 0 FCFA";

        return;
    }

    panier.forEach((article,index)=>{

        let sousTotal =
        article.prix * article.qte;

        totalGeneral += sousTotal;

        liste.innerHTML += `

        <div class="article">

            <!-- IMAGE CORRIGÉE -->
            <img src="${article.image}" alt="produit"
            onerror="this.src='placeholder.jpg'">

            <div class="infos">

                <h3>${article.nom}</h3>

                <p><strong>Taille :</strong> ${article.taille}</p>

                <p><strong>Quantité :</strong> ${article.qte}</p>

                <p><strong>Prix :</strong> ${article.prix} FCFA</p>

                <p><strong>Sous-total :</strong> ${sousTotal} FCFA</p>

            </div>

            <div class="actions-produit">

                <button
                class="valider"
                onclick="commanderProduit(${index})">
                ✅
                </button>

                <button
                class="supprimer"
                onclick="supprimerProduit(${index})">
                🗑️
                </button>

            </div>

        </div>
        `;
    });

    document.getElementById("totalGeneral")
    .innerText =
    "TOTAL : " + totalGeneral + " FCFA";
}

/* =========================
   SUPPRIMER UN PRODUIT
========================= */
function supprimerProduit(index){

    panier.splice(index,1);

    localStorage.setItem(
        "panier",
        JSON.stringify(panier)
    );

    afficherPanier();
}

/* =========================
   COMMANDER UN PRODUIT
========================= */
function commanderProduit(index){

    let article = panier[index];

    let sousTotal =
    article.prix * article.qte;

    let message =
`Bonjour,

Je souhaite commander :

🛍 Produit : ${article.nom}
📏 Taille : ${article.taille}
📦 Quantité : ${article.qte}
💰 Prix unitaire : ${article.prix} FCFA
💵 Total : ${sousTotal} FCFA`;

    let numero = "2250759990003";

    let url =
    `https://wa.me/${numero}?text=${encodeURIComponent(message)}`;

    window.open(url,"_blank");
}

/* =========================
   COMMANDER TOUT LE PANIER
========================= */
function commanderTout(){

    let total = 0;

    let message =
`Bonjour,

Je souhaite commander :

`;

    panier.forEach((article,index)=>{

        let sousTotal =
        article.prix * article.qte;

        total += sousTotal;

        message +=

`${index+1}. ${article.nom}

📏 Taille : ${article.taille}
📦 Quantité : ${article.qte}
💰 Prix unitaire : ${article.prix} FCFA
💵 Sous-total : ${sousTotal} FCFA

`;
    });

    message +=
`\n💳 MONTANT TOTAL : ${total} FCFA`;

    let numero = "2250565907472";

    let url =
    `https://wa.me/${numero}?text=${encodeURIComponent(message)}`;

    window.open(url,"_blank");
}

/* =========================
   INITIALISATION
========================= */
afficherPanier();

</script>

</body>
</html>
